<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="title">
            <h1>My Personal Blog</h1>
            <h2>Welcome to My Blog!</h2>
        </div>
    </header>

    <main>
        <a href="/">Back to Home</a>
        <div class="article">
            <hr>
            <h2>{{.Title}}</h2>
            <p>Published: {{.PublishedAt.Format "2006-01-02"}} </p>
            <article>
                {{.Content}}
            </article>
        </div>
    </main>
</body>
</html>
